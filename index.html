<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Critical Resource Hints for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">
    
    <!-- Preload critical assets -->
    <link rel="modulepreload" href="/src/main.tsx">
    <link rel="modulepreload" href="/src/App.tsx">
    
    <!-- Critical CSS inline to prevent render blocking -->
    <style>
      /* Critical above-the-fold styles */
      body { 
        margin: 0; 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: hsl(0 0% 100%);
        color: hsl(222.2 84% 4.9%);
      }
      .loading-screen { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        height: 100vh; 
        background: linear-gradient(135deg, hsl(235 47% 55%) 0%, hsl(252 35% 45%) 100%);
      }
      .loading-spinner { 
        width: 40px; 
        height: 40px; 
        border: 3px solid rgba(255,255,255,0.3); 
        border-radius: 50%; 
        border-top-color: white; 
        animation: spin 1s ease-in-out infinite; 
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <link rel="icon" href="/lovable-uploads/f0a30a0d-578a-4da3-89e9-934e5fd30799.png" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <title>ToolsML - Your Ultimate AI Tools Hub</title>
    <meta name="description" content="Discover the best AI tools across every industry. Your ultimate directory for finding and comparing AI-powered tools used by professionals worldwide." />
    <meta name="author" content="ToolsML" />
    <meta name="keywords" content="AI tools, artificial intelligence, productivity tools, AI directory, machine learning tools" />

    <!-- Cache Control Headers -->
    <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">

    <meta property="og:title" content="ToolsML - Your Ultimate AI Tools Hub" />
    <meta property="og:description" content="Discover the best AI tools across every industry. Your ultimate directory for finding and comparing AI-powered tools used by professionals worldwide." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BWC5XNH86E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-BWC5XNH86E');
    </script>
  </head>

  <body>
    <div id="root">
      <!-- Fallback loading screen while JavaScript loads -->
      <div class="loading-screen">
        <div class="loading-spinner"></div>
      </div>
    </div>
    
    <!-- Main application script with performance optimizations -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker for caching (optional but recommended) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed, but app will still work
          });
        });
      }
    </script>
  </body>
</html>
