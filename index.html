<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Critical Resource Hints for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.googletagmanager.com">
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">
    
    <!-- Async font loading with font-display swap for optimal LCP -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>
    <script>
      // Async font loading polyfill for older browsers
      !function(e){"use strict";var t=function(t,n,o){var r,a=e.document,i=a.createElement("link");if(n)r=n;else{var d=(a.body||a.getElementsByTagName("head")[0]).childNodes;r=d[d.length-1]}var l=a.styleSheets;if(o)for(var s in o)o.hasOwnProperty(s)&&i.setAttribute(s,o[s]);i.rel="stylesheet",i.href=t,i.media="only x",function e(t){if(a.body)return t();setTimeout(function(){e(t)})}(function(){r.parentNode.insertBefore(i,n?r:r.nextSibling)});var f=function(e){for(var t=i.href,n=l.length;n--;)if(l[n].href===t)return e();setTimeout(function(){f(e)})};return i.addEventListener&&i.addEventListener("load",function(){this.media="all"}),i.onloadcssdefined=f,f(function(){i.media!=="all"&&(i.media="all")}),i};"undefined"!=typeof exports?exports.loadCSS=t:e.loadCSS=t}("undefined"!=typeof global?global:this);
    </script>
    
    <!-- Let Vite handle asset loading and MIME types -->
    
    <!-- Critical CSS inline to prevent render blocking -->
    <style>
      /* Critical above-the-fold styles */
      body { 
        margin: 0; 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: hsl(0 0% 100%);
        color: hsl(222.2 84% 4.9%);
      }
      .loading-screen { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        height: 100vh; 
        background: linear-gradient(135deg, hsl(235 47% 55%) 0%, hsl(252 35% 45%) 100%);
      }
      .loading-spinner { 
        width: 40px; 
        height: 40px; 
        border: 3px solid rgba(255,255,255,0.3); 
        border-radius: 50%; 
        border-top-color: white; 
        animation: spin 1s ease-in-out infinite; 
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      /* Critical Header Styles */
      .nav-glass {
        background-color: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      }
      .text-gradient {
        background: linear-gradient(135deg, hsl(235 47% 55%), hsl(252 35% 45%));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      /* Critical Hero Styles */
      .hero-gradient {
        background: linear-gradient(135deg, hsl(235 47% 55%) 0%, hsl(252 35% 45%) 100%);
      }
      .hero-title {
        font-size: 3rem;
        font-weight: 900;
        color: white;
        margin-bottom: 1.5rem;
        text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        line-height: 1.1;
      }
      @media (min-width: 768px) {
        .hero-title {
          font-size: 4rem;
        }
      }
      .hero-subtitle {
        font-size: 1.25rem;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 3rem;
        max-width: 42rem;
        margin-left: auto;
        margin-right: auto;
      }
      @media (min-width: 768px) {
        .hero-subtitle {
          font-size: 1.5rem;
        }
      }
      
      /* Critical Layout Classes */
      .fixed { position: fixed; }
      .top-0 { top: 0; }
      .w-full { width: 100%; }
      .z-50 { z-index: 50; }
      .min-h-screen { min-height: 100vh; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .pt-16 { padding-top: 4rem; }
      .text-center { text-align: center; }
    </style>
    
    <!-- Let Vite handle CSS loading with proper MIME types -->
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- SEO Meta Tags - Defaults for crawlers, React Helmet adds page-specific overrides -->
    <title>ToolsML — Discover & Compare the Best AI Tools (Curated Weekly)</title>
    <meta name="description" content="Find and compare the best AI tools for writing, design, video, code, and more. Human-curated, updated weekly with features, pricing, and real use-cases." />
    <meta name="author" content="ToolsML Editorial Team" />
    <meta name="keywords" content="AI tools, artificial intelligence, machine learning, productivity, automation, AI directory, AI software, best AI tools, AI comparison, AI reviews" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#667eea" />
    
    <!-- Canonical URL - Managed exclusively by React Helmet for each page -->
    <!-- DO NOT set a default canonical here as it confuses crawlers -->
    <!-- React Helmet will set the correct canonical URL per page -->
    
    <!-- Prerender hints for SEO crawlers -->
    <meta name="fragment" content="!">
    <meta name="prerender-status-code" content="200">

    <!-- Cache Control Headers -->
    <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">

    <!-- Open Graph Meta Tags - Helmet overrides per-page -->
    <meta property="og:title" content="ToolsML — Discover & Compare the Best AI Tools (Curated Weekly)" />
    <meta property="og:description" content="Find and compare the best AI tools for writing, design, video, code, and more. Human-curated, updated weekly with features, pricing, and real use-cases." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ToolsML" />
    <meta property="og:image" content="https://toolsml.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Meta Tags - Helmet overrides per-page -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ToolsML — Discover & Compare the Best AI Tools (Curated Weekly)" />
    <meta name="twitter:description" content="Find and compare the best AI tools for writing, design, video, code, and more. Human-curated, updated weekly with features, pricing, and real use-cases." />
    <meta name="twitter:image" content="https://toolsml.com/og-image.jpg" />
    <meta name="twitter:site" content="@toolsml" />
    <meta name="twitter:creator" content="@toolsml" />
    
    <!-- Google tag (gtag.js) - Defer to prevent render blocking -->
    <link rel="preconnect" href="https://www.google-analytics.com">
    <script async defer src="https://www.googletagmanager.com/gtag/js?id=G-BWC5XNH86E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BWC5XNH86E', {
        'send_page_view': false  // Prevent automatic page view, let app control
      });
    </script>
  </head>

  <body>
    <div id="root">
      <!-- Fallback loading screen while JavaScript loads -->
      <div class="loading-screen">
        <div class="loading-spinner"></div>
      </div>
    </div>
    
    <!-- Main application script with performance optimizations -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker for caching (optional but recommended) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed, but app will still work
          });
        });
      }
    </script>
  </body>
</html>
